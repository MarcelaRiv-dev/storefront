<h2 mat-dialog-title>
  <mat-icon style="vertical-align: middle; margin-right: 8px;">{{ isEdit ? 'edit' : 'add_circle' }}</mat-icon>
  {{ isEdit ? 'Edit Product' : 'Add New Product' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Product Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter product name">
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" placeholder="Product description..."></textarea>
    </mat-form-field>

    <div class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <span matPrefix>$ &nbsp;</span>
        <input matInput type="number" formControlName="price" min="0" step="0.01">
        <mat-error *ngIf="form.get('price')?.hasError('required')">Price is required</mat-error>
        <mat-error *ngIf="form.get('price')?.hasError('min')">Price must be >= 0</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Stock Quantity</mat-label>
        <input matInput type="number" formControlName="stockQuantity" min="0">
        <mat-error *ngIf="form.get('stockQuantity')?.hasError('min')">Must be >= 0</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category</mat-label>
      <input matInput formControlName="category" placeholder="e.g., Electronics, Clothing...">
      <mat-error *ngIf="form.get('category')?.hasError('required')">Category is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Image URL (optional)</mat-label>
      <input matInput formControlName="imageUrl" placeholder="https://...">
    </mat-form-field>

    <div class="checkbox-row">
      <mat-checkbox formControlName="active">Active (visible in store)</mat-checkbox>
    </div>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid">
    <mat-icon>{{ isEdit ? 'save' : 'add' }}</mat-icon>
    {{ isEdit ? 'Save Changes' : 'Create Product' }}
  </button>
</mat-dialog-actions>
