<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-logo">
        <mat-icon class="logo-icon">store</mat-icon>
      </div>
      <mat-card-title>Sign In</mat-card-title>
      <mat-card-subtitle>SpecSync Demo Storefront</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="username" autocomplete="username" placeholder="Enter your username">
          <mat-error *ngIf="form.get('username')?.hasError('required')">Username is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" autocomplete="current-password" placeholder="Enter your password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width login-btn"
                [disabled]="form.invalid || loading">
          <mat-spinner *ngIf="loading" diameter="20" style="display:inline-block; margin-right:8px;"></mat-spinner>
          <mat-icon *ngIf="!loading">login</mat-icon>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-footer>
      <div class="login-footer">
        <p>Don't have an account?
          <a routerLink="/users" class="register-link">Register here</a>
        </p>
      </div>
    </mat-card-footer>
  </mat-card>
</div>
