<div class="page-container">
  <div class="page-header">
    <h1>
      <mat-icon style="vertical-align: middle; margin-right: 8px;">people</mat-icon>
      Users
    </h1>
    <button mat-raised-button color="primary" (click)="openRegisterDialog()">
      <mat-icon>person_add</mat-icon>
      Register User
    </button>
  </div>

  <div class="filter-bar">
    <mat-form-field appearance="outline" style="flex: 1; max-width: 400px;">
      <mat-label>Search users</mat-label>
      <mat-icon matPrefix>search</mat-icon>
      <input matInput [(ngModel)]="searchValue" (ngModelChange)="applyFilter()" placeholder="Username, email, or role...">
      <button *ngIf="searchValue" matSuffix mat-icon-button (click)="searchValue = ''; applyFilter()">
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>

    <span class="spacer"></span>
    <span class="results-info" *ngIf="!loading">
      {{ dataSource.filteredData.length }} user(s)
    </span>
  </div>

  <div class="loading-spinner" *ngIf="loading">
    <mat-spinner></mat-spinner>
  </div>

  <mat-card *ngIf="!loading">
    <mat-card-content>
      <div class="empty-state" *ngIf="dataSource.data.length === 0">
        <mat-icon>people</mat-icon>
        <p>No users found</p>
      </div>

      <table mat-table [dataSource]="dataSource" matSort class="users-table" *ngIf="dataSource.data.length > 0">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let user">
            <span class="user-id">{{ user.id }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="username">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Username</th>
          <td mat-cell *matCellDef="let user">
            <div class="user-name-cell">
              <mat-icon class="avatar-icon">account_circle</mat-icon>
              <strong>{{ user.username }}</strong>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let user">{{ user.email }}</td>
        </ng-container>

        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
          <td mat-cell *matCellDef="let user">
            <mat-chip [color]="getRoleColor(user.role)" selected>{{ user.role }}</mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="createdAt">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Joined</th>
          <td mat-cell *matCellDef="let user">
            {{ user.createdAt ? (user.createdAt | date:'mediumDate') : '—' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let user">
            <button mat-icon-button color="warn" (click)="deleteUser(user)" matTooltip="Delete user">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="user-row"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons *ngIf="dataSource.data.length > 0"></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
